<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤管理后台</title>
    <style>
        :root { --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --accent: #2563eb; --card-bg: #ffffff; }
        body { margin: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* 登录页样式 */
        #login-page { width: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center; }
        .login-card h2 { margin-bottom: 24px; color: #1e293b; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        #login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #login-btn:hover { background: #1d4ed8; }

        /* 后台布局样式 */
        #main-app { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #f8fafc; display: flex; flex-direction: column; padding: 24px; }
        .sidebar h2 { font-size: 1.25rem; margin-bottom: 32px; border-bottom: 1px solid #334155; padding-bottom: 16px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 8px; color: #cbd5e1; font-size: 0.95rem; }
        .nav-item.active { background: var(--accent); color: white; }
        .logout-btn { margin-top: auto; color: #94a3b8; cursor: pointer; font-size: 0.9rem; text-align: center; padding: 10px; border: 1px solid #334155; border-radius: 8px; }

        .content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .stats-card { background: var(--card-bg); width: 100%; max-width: 700px; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .stats-card h3 { margin: 0 0 8px 0; color: #1e293b; }
        #user-role-display { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }

        .time-box { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin: 24px 0; letter-spacing: -1px; }
        
        .input-row { display: flex; gap: 20px; margin-bottom: 24px; text-align: left; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 6px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }

        .btn-row { display: flex; gap: 16px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 1rem; }
        .btn-in { background: #10b981; }
        .btn-in:hover { background: #059669; }
        .btn-out { background: #f59e0b; }
        .btn-out:hover { background: #d97706; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h2>管理后台</h2>
            <input type="text" id="username" placeholder="请输入账号">
            <input type="password" id="password" placeholder="密码 (默认 123456)">
            <button id="login-btn">立 即 登 录</button>
        </div>
    </div>

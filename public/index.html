<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-page" class="container">
        <div class="card">
            <h2>系统登录</h2>
            <input type="text" id="username" placeholder="账号 (admin/user/测试员)">
            <input type="password" id="password" placeholder="密码">
            <button id="login-btn">登录</button>
        </div>
    </div>

    <div id="main-app" class="container hidden">
        <div class="card">
            <h3>今日考勤数据上报</h3>
            <p id="user-role-display" style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;"></p>
            
            <div id="current-time" style="font-size: 2.5rem; font-weight: bold; color: #2563eb; margin-bottom: 20px;">00:00:00</div>
            
            <div class="input-group">
                <label>今日请假人数</label>
                <input type="number" id="vacation-input" value="0" min="0">
            </div>
            
            <div class="input-group">
                <label>今日迟到人数</label>
                <input type="number" id="late-input" value="0" min="0">
            </div>

            <div class="button-group">
                <button id="work-in-btn" class="btn-green">上班打卡并同步</button>
                <button id="work-out-btn" class="btn-orange">下班打卡并同步</button>
            </div>
        </div>
        <button id="logout-btn" style="margin-top: 20px; background: none; color: #64748b; border: none; cursor: pointer;">退出登录</button>
    </div>

    <script src="app.js"></script>
</body>
</html>

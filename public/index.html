<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤管理后台</title>
    <style>
        :root { --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --accent: #2563eb; }
        body { margin: 0; font-family: sans-serif; background: var(--main-bg); display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* 登录页全屏居中 */
        #login-page { width: 100%; display: flex; justify-content: center; align-items: center; background: #1e293b; position: fixed; inset: 0; z-index: 999; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 320px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        #login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 后台布局 */
        #main-app { display: flex; width: 100%; }
        .sidebar { width: 240px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .stats-card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .time-box { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 20px 0; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h2 style="margin-top:0">管理后台</h2>
            <input type="text" id="username" placeholder="用户名 (admin/user/测试员)">
            <input type="password" id="password" placeholder="密码 (123456)">
            <button id="login-btn">登 录</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="sidebar">
            <h3>考勤系统</h3>
            <div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:5px">📊 考勤上报</div>
            <div style="margin-top:auto; cursor:pointer; color:#94a3b8" onclick="location.reload()">退出登录</div>
        </div>
        <div class="content">
            <div class="stats-card">
                <h3 id="user-role-display">欢迎回来</h3>
                <div class="time-box" id="current-time">00:00:00</div>
                <div style="text-align:left; margin-bottom:15px">
                    <label style="font-size:0.8rem; color: #64748b">请假人数</label>
                    <input type="number" id="vacation-input" value="0" style="width:100%; padding:10px; margin-top:5px">
                </div>
                <div style="text-align:left; margin-bottom:15px">
                    <label style="font-size:0.8rem; color: #64748b">迟到人数</label>
                    <input type="number" id="late-input" value="0" style="width:100%; padding:10px; margin-top:5px">
                </div>
                <div class="btn-row">
                    <button id="work-in-btn" class="btn" style="background:#10b981">上班打卡</button>
                    <button id="work-out-btn" class="btn" style="background:#f59e0b">下班打卡</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<div id="admin-area" class="admin-section hidden">
    <h4 style="margin-top:0; color: #7c3aed">🛡️ 管理员代点假 (指定员工)</h4>
    
    <div class="input-group">
        <label>选择员工</label>
        <select id="target-employee" style="width:100%; padding:10px; border-radius:6px; border:1px solid #cbd5e1;"></select>
    </div>

    <div class="input-group">
        <label>假期类型</label>
        <select id="leave-type" style="width:100%; padding:10px; border-radius:6px; border:1px solid #cbd5e1;">
            <option value="事假">事假</option>
            <option value="病假">病假</option>
            <option value="产假">产假</option>
            <option value="年假">年假</option>
        </select>
    </div>

    <button id="admin-sync-btn" class="btn" style="background: #7c3aed; width: 100%;">确认代点并同步机器人</button>
</div>

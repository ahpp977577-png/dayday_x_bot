<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业内部考勤管理系统</title>
    <style>
        /* 直接把 style.css 的内容粘贴在这里 */
        :root { --primary-color: #2563eb; --success-color: #10b981; --warning-color: #f59e0b; --danger-color: #ef4444; --bg-light: #f8fafc; --sidebar-bg: #1e293b; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg-light); color: #334155; }
        .hidden { display: none !important; }
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow); width: 100%; max-width: 400px; }
        #main-app { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 1.5rem; }
        .logo { font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; color: #60a5fa; }
        .sidebar nav a { display: block; color: #94a3b8; text-decoration: none; padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 0.5rem; cursor: pointer; }
        .sidebar nav a:hover { background: rgba(255,255,255,0.1); }
        .content { flex: 1; padding: 2rem; overflow-y: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 10px; box-shadow: var(--card-shadow); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        input, select, textarea { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; margin-top: 5px; }
        button { cursor: pointer; border: none; padding: 0.7rem 1.2rem; border-radius: 6px; transition: 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; width: 100%; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-warning { background: var(--warning-color); color: white; }
        .btn-text { background: transparent; color: #94a3b8; margin-top: auto; }
        .time-display { font-size: 2.5rem; font-weight: bold; color: var(--primary-color); margin: 1rem 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div id="login-page" class="auth-container">
        <div class="auth-card">
            <h2>系统登录</h2>
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" placeholder="admin 或 user">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" value="123456">
            </div>
            <button onclick="handleLogin()" class="btn-primary">登录</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <aside class="sidebar">
            <div class="logo">考勤管理</div>
            <nav id="nav-menu"></nav>
            <button onclick="logout()" class="btn-text">退出登录</button>
        </aside>
        <main class="content">
            <section id="check-in-section" class="page">
                <h3>今日考勤</h3>
                <div class="card">
                    <div class="time-display" id="current-time">00:00:00</div>
                    <div id="today-status">状态：未打卡</div>
                    <div style="margin-top:20px">
                        <button onclick="punchIn('上班')" class="btn-success">上班打卡</button>
                        <button onclick="punchIn('下班')" class="btn-warning">下班打卡</button>
                    </div>
                </div>
            </section>
            <section id="history-section" class="page hidden">
                <h3>打卡历史记录</h3>
                <div class="card"><table id="hist-table"><thead><tr><th>日期</th><th>时间</th><th>类型</th></tr></thead><tbody></tbody></table></div>
            </section>
        </main>
    </div>

    <script>
        // 简单的逻辑控制
        function handleLogin() {
            const user = document.getElementById('username').value;
            if(user === 'admin' || user === 'user') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderMenu(user);
            } else {
                alert('请输入 admin 或 user');
            }
        }

        function renderMenu(role) {
            const nav = document.getElementById('nav-menu');
            nav.innerHTML = `<a onclick="showPage('check-in')">今日打卡</a>
                             <a onclick="showPage('history')">历史记录</a>`;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
        }

        function punchIn(type) {
            alert(type + '打卡成功！');
            const tbody = document.querySelector('#hist-table tbody');
            tbody.innerHTML += `<tr><td>${new Date().toLocaleDateString()}</td><td>${new Date().toLocaleTimeString()}</td><td>${type}</td></tr>`;
        }

        function logout() { location.reload(); }
        
        setInterval(() => {
            const clock = document.getElementById('current-time');
            if(clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
